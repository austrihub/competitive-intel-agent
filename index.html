<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Competitive Intelligence Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="badge">AI AGENT · POWERED BY CLAUDE</div>
    <h1>Competitive Intelligence</h1>
    <p class="subtitle">Enter any company. The agent searches the web and produces a full competitive brief.</p>

    <div class="search-box">
      <input type="text" id="query" placeholder="e.g. HubSpot, Notion, Salesforce..." />
      <button id="runBtn" onclick="analyze()">Run Agent →</button>
    </div>

    <div id="status" class="status hidden"></div>
    <div id="error" class="error hidden"></div>
    <div id="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
